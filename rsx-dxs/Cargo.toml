[package]
name = "rsx-dxs"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
crc32fast = "1.4"
bytes = "1"
tracing = "0.1"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
chrono = "0.4"
rsx-types = { path = "../rsx-types" }

[dev-dependencies]
criterion = "0.5"
tempfile = "3"

[[bench]]
name = "wal_bench"
harness = false

[[bench]]
name = "encode_bench"
harness = false
