# RSX casting/UDP socket buffer tuning. Installed to
# /etc/sysctl.d/99-rsx.conf by deploy.sh (mirrors `make tune-host`).
#
# The order firehose (ME → risk, ME → marketdata) is casting/UDP. The
# default 208 KB kernel receive buffer overruns under load: the kernel
# drops datagrams → RcvbufErrors → the consumer sees a seq gap → it
# FAULTS into replay. 25 MB gives the pinned busy-spin consumers slack
# to drain a burst without loss.
net.core.rmem_max = 26214400
net.core.wmem_max = 26214400
net.core.rmem_default = 26214400
